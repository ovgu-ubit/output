<h2 mat-dialog-title>Demo-Login</h2>

<form [formGroup]="form" (ngSubmit)="login()">
  <mat-dialog-content class="demo-login-content">
    <mat-form-field appearance="fill">
      <mat-label>Benutzername</mat-label>
      <input matInput formControlName="username" autocomplete="username">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Passwort</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="current-password">
    </mat-form-field>

    <div class="demo-login-error" *ngIf="errorMessage">{{errorMessage}}</div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="isSubmitting">Abbrechen</button>
    <button mat-raised-button class="primary-button" type="submit" [disabled]="isSubmitting">Login</button>
  </mat-dialog-actions>
</form>
